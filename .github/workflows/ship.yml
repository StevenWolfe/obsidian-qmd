name: Ship Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

jobs:
  ship:
    name: Bump version and tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # ── Bump version ───────────────────────────────────────────────────────
      - name: Bump version numbers
        id: bump
        run: |
          CURRENT=$(node -p "require('./manifest.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '$NEW';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "

          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
            const minApp = require('./manifest.json').minAppVersion;
            v['$NEW'] = minApp;
            fs.writeFileSync('versions.json', JSON.stringify(v, null, 2) + '\n');
          "

          echo "Bumped $CURRENT → $NEW"

      # ── Commit & tag — pushing the tag triggers release.yml ────────────────
      - name: Commit and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json versions.json
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.bump.outputs.version }}"
